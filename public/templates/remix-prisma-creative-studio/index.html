<!DOCTYPE html>
<html>
<head>
  <title>Remix: Prisma Creative Studio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Instrument+Serif:ital@0;1&display=swap');
    * { margin: 0; padding: 0; outline: none !important; box-sizing: border-box; font-family: 'Almarai', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    html, body { width: 100%; min-height: 100%; background: #000; color: #E1E0CC; }
    body { overflow-y: scroll; }
    canvas { display: block; outline: none !important; }
    .prisma-noise {
      position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.18; mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");
    }
  </style>
</head>
<body>
  <div class="prisma-noise"></div>
  <div id="root"></div>
</body>
</html>
